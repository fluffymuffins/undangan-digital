<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Undangan Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-box">

      <div class="auth-header">
        <div class="ornament">✦ ─── ✦ ─── ✦</div>
        <h1 class="auth-title">Undangan Digital</h1>
        <p class="auth-sub">Buat password baru</p>
        <div class="ornament">✦ ─── ✦ ─── ✦</div>
      </div>

      <!-- PANEL: Form password baru -->
      <div id="panel-form">
        <form id="form-reset" onsubmit="simpanPasswordBaru(event)">
          <div class="form-group">
            <label>Password Baru</label>
            <input type="password" id="password-baru"
              placeholder="Minimal 8 karakter"
              minlength="8" required
              oninput="cekKekuatan(this.value)"/>
            <div class="password-strength-wrap">
              <div class="password-strength" id="strength-bar"></div>
            </div>
            <p class="form-hint" id="strength-label"></p>
          </div>
          <div class="form-group">
            <label>Konfirmasi Password</label>
            <input type="password" id="password-konfirmasi"
              placeholder="Ulangi password baru"
              minlength="8" required/>
          </div>
          <p id="reset-error" style="font-size:13px;min-height:20px;
            text-align:center;margin-bottom:12px;color:#e07070"></p>
          <button type="submit" class="btn-submit" id="btn-simpan">
            Simpan Password Baru
          </button>
        </form>
      </div>

      <!-- PANEL: Sukses -->
      <div id="panel-sukses" style="display:none;text-align:center">
        <div style="font-size:40px;margin-bottom:20px">✓</div>
        <p style="font-family:var(--serif);font-size:22px;
          color:var(--gold-terang);margin-bottom:12px">
          Password berhasil diubah!
        </p>
        <p style="font-size:13px;color:var(--teks-redup);
          margin-bottom:24px;line-height:1.8">
          Kamu sekarang bisa login dengan password baru.
        </p>
        <a href="login.html" class="btn-submit"
          style="display:block;text-align:center;text-decoration:none">
          Ke Halaman Login
        </a>
      </div>

      <!-- PANEL: Link tidak valid -->
      <div id="panel-error" style="display:none;text-align:center">
        <div style="font-size:40px;margin-bottom:20px">⚠️</div>
        <p style="font-family:var(--serif);font-size:22px;
          color:#e07070;margin-bottom:12px">
          Link tidak valid atau sudah kadaluarsa
        </p>
        <p style="font-size:13px;color:var(--teks-redup);margin-bottom:24px">
          Link reset password berlaku 1 jam. Silakan minta link baru.
        </p>
        <a href="lupa-password.html" class="btn-submit"
          style="display:block;text-align:center;text-decoration:none">
          Minta Link Baru
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/reset-password.js"></script>
</body>
</html>
