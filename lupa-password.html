<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lupa Password – Undangan Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-box">

      <div class="auth-header">
        <div class="ornament">✦ ─── ✦ ─── ✦</div>
        <h1 class="auth-title">Undangan Digital</h1>
        <div class="ornament">✦ ─── ✦ ─── ✦</div>
      </div>

      <!-- PANEL 1: Form kirim email -->
      <div id="panel-form">
        <p class="auth-sub" style="text-align:center;margin-bottom:28px">
          Masukkan email akunmu. Kami akan kirimkan link untuk reset password.
        </p>
        <form id="form-lupa" onsubmit="kirimReset(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reset-email"
              placeholder="email@kamu.com" required autocomplete="email"/>
          </div>
          <p id="reset-error" style="font-size:13px;min-height:20px;
            text-align:center;margin-bottom:12px"></p>
          <button type="submit" class="btn-submit" id="btn-reset">
            Kirim Link Reset
          </button>
        </form>
      </div>

      <!-- PANEL 2: Sukses -->
      <div id="panel-sukses" style="display:none;text-align:center">
        <div style="font-size:40px;margin-bottom:20px">✉️</div>
        <p style="font-family:var(--serif);font-size:22px;
          color:var(--gold-terang);margin-bottom:12px">
          Email terkirim!
        </p>
        <p style="font-size:13px;color:var(--teks-redup);line-height:1.8">
          Cek inbox email-mu dan klik link reset password.<br/>
          Link berlaku selama <strong style="color:var(--teks)">1 jam</strong>.
        </p>
        <p style="font-size:12px;color:var(--teks-redup);
          margin-top:16px;opacity:0.7">
          Tidak ada email? Cek folder spam.
        </p>
      </div>

      <p class="auth-footer-note" style="margin-top:24px">
        <a href="login.html"
          style="color:var(--gold);text-decoration:none;font-size:12px;
                 letter-spacing:2px">
          ← Kembali ke Login
        </a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/lupa-password.js"></script>
</body>
</html>
